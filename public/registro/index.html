<!doctype html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Universidad UNE | Registro</title>
        <link rel="shortcut icon" type="image/png" href="../assets/images/logos/favicon.ico" />
        <link rel="stylesheet" href="../assets/css/styles.min.css" />
    </head>

    <body>
        <!--  Body Wrapper -->
        <div class="page-wrapper" id="main-wrapper" data-layout="vertical" data-navbarbg="skin6" data-sidebartype="full"
             data-sidebar-position="fixed" data-header-position="fixed">
            <div
                class="position-relative overflow-hidden radial-gradient min-vh-100 d-flex align-items-center justify-content-center">
                <div class="d-flex align-items-center justify-content-center w-100">
                    <div class="row justify-content-center w-100">
                        <div class="col-md-8 col-lg-6 col-xxl-3">
                            <div class="card mb-0">
                                <div class="card-body">
                                    <a href="./index.html" class="text-nowrap logo-img text-center d-block py-3 w-100">
                                        <img src="../assets/images/logos/dark-logo.svg" width="180" alt="">
                                    </a>
                                    <p class="text-dark fs-4 mb-7">Crear cuenta</p>
                                    <div class="d-flex align-items-center gap-3">
                                        <a class="btn w-100 text-dark border fw-bold d-flex align-items-center justify-content-center rounded-1 py-6 shadow-none" href="javascript:void(0)" role="button">
                                            <img src="../assets/images/icon/google-icon.svg" alt="spike-img" class="img-fluid me-2" width="24" height="24">
                                        </a>
                                        <a class="btn w-100 text-dark border fw-bold d-flex align-items-center justify-content-center rounded-1 py-6 shadow-none" href="javascript:void(0)" role="button">
                                            <img src="../assets/images/icon/icon-facebook.svg" alt="spike-img" class="img-fluid me-2" width="24" height="24">
                                        </a>
                                    </div>
                                    <div class="position-relative text-center my-7">
                                        <p class="mb-0 fs-3 px-3 d-inline-block bg-white z-1 position-relative">o regístrate con </p>
                                        <span class="border-top w-100 position-absolute top-50 start-50 translate-middle"></span>
                                    </div>
                                    <form id="registroForm">
                                        <div class="mb-3">
                                            <label for="nombre" class="form-label">Nombre</label>
                                            <input type="text" class="form-control" id="nombre" name="nombre" required>
                                        </div>
                                        <div class="mb-3">
                                            <label for="apellido" class="form-label">Apellido</label>
                                            <input type="text" class="form-control" id="apellido" name="apellido" required>
                                        </div>
                                        <div class="mb-3">
                                            <label for="matricula" class="form-label">Matrícula</label>
                                            <input type="text" class="form-control" id="matricula" name="matricula" required>
                                        </div>
                                        <div class="mb-3">
                                            <label for="correo" class="form-label">Correo electrónico</label>
                                            <input type="email" class="form-control" id="correo" name="correo" required readonly>
                                        </div>
                                        <div class="mb-4">
                                            <label for="contrasenia" class="form-label">Contraseña</label>
                                            <input type="password" class="form-control" id="contrasenia" name="contrasenia" required>
                                        </div>
                                        <div class="mb-4">
                                            <label for="contraseniaConfirma" class="form-label">Confirma contraseña</label>
                                            <input type="password" class="form-control" id="contraseniaConfirma" name="contraseniaConfirma" required>
                                        </div>
                                        <button disabled="" id="btnSubmit" type="submit" class="btn btn-primary w-100 fs-4 mb-4 rounded-2">Registrarse</button>
                                        <div class="d-flex align-items-center justify-content-center">
                                            <p class="fs-4 mb-0 fw-bold">¿Ya tienes una cuenta?</p>
                                            <a class="text-primary fw-bold ms-2" href="../">Inicia sesión</a>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="../assets/libs/jquery/dist/jquery.min.js"></script>
        <script src="../assets/libs/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
        <script src="../assets/libs/jquery-validation/dist/jquery.validate.min.js"></script>
        <script src="../assets/js/sweetalert.min.js"></script>
        <script src="../assets/js/util.js"></script>
        <script src="api/registro.js"></script>
    </body>

</html>
