<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>{{TITULO}}</title>
    <style>
        body {
            font-family: "DejaVu Sans", Helvetica, Arial, sans-serif;
            font-size: 10px;
            color: #24362E;
            margin: 0;
            padding: 0;
            background-color: #FFFFFF;
            line-height: 1.4;
        }

        table {
            border-collapse: collapse;
            page-break-inside: auto;
        }

        thead { display: table-header-group; }
        tbody { display: table-row-group; }
        tr    { page-break-inside: avoid; }

        @page {
            margin: 1.1cm 1.2cm;
            size: A4;
        }

        /* ── Tipografía ── */
        .bold        { font-weight: bold; }
        .text-center { text-align: center; }
        .text-right  { text-align: right; }
        .uppercase   { text-transform: uppercase; }
        .text-xs  { font-size: 7.5px; }
        .text-sm  { font-size: 9px; }
        .text-md  { font-size: 10px; }
        .text-lg  { font-size: 12px; }
        .text-xl  { font-size: 15px; }
        .text-2xl { font-size: 18px; }

        /* ── Paleta ── */
        .bg-green        { background-color: #13493B; }
        .bg-green-soft   { background-color: #EAF0EC; }
        .bg-yellow-light { background-color: #FBF5D8; }
        .bg-white        { background-color: #FFFFFF; }
        .text-white      { color: #FFFFFF; }
        .text-green      { color: #13493B; }
        .text-green-dark { color: #0F3A30; }
        .text-muted      { color: #6B7A70; }
        .text-yellow     { color: #C9A800; }

        /* ── Separadores ── */
        .section-rule {
            height: 2px;
            background-color: #13493B;
            margin: 0 0 2px 0;
        }
        .section-rule-thin {
            height: 1px;
            background-color: #D4E0D8;
            margin: 0 0 8px 0;
        }

        /* ── Encabezado de meta-información ── */
        .doc-meta {
            font-size: 7.5px;
            color: #5A6B62;
            padding: 4px 0 6px 0;
            margin-bottom: 0;
            border-bottom: 1px solid #D4E0D8;
        }

        /* ── Sección label (título de bloque) ── */
        .section-label {
            font-size: 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #13493B;
            padding: 10px 0 4px 0;
        }

        /* ── Tabla de datos genérica ── */
        .data-table { width: 100%; }
        .data-table th {
            background-color: #13493B;
            color: #FFFFFF;
            font-size: 7.5px;
            font-weight: bold;
            text-transform: uppercase;
            padding: 5px 6px;
            text-align: left;
        }
        .data-table td {
            padding: 5px 6px;
            font-size: 8.5px;
            border-bottom: 1px solid #E8EEEA;
        }
        .data-table tr:nth-child(even) td { background-color: #F5F8F6; }
        .data-table tr:nth-child(odd)  td { background-color: #FFFFFF; }

        /* ── Tarjeta de estadística (totales) ── */
        .stat-cell {
            text-align: center;
            padding: 10px 8px;
        }
        .stat-number {
            font-size: 22px;
            font-weight: bold;
            color: #13493B;
            line-height: 1;
        }
        .stat-label {
            font-size: 7.5px;
            font-weight: bold;
            text-transform: uppercase;
            color: #5A6B62;
            margin-top: 3px;
        }

        /* ── Pill de filtro ── */
        .filter-pill {
            display: inline-block;
            font-size: 8px;
            color: #0F3A30;
            padding: 2px 0;
            margin-bottom: 1px;
        }

        /* ── Tarjeta de municipio ── */
        .mun-card {
            padding: 7px 9px;
            border-bottom: 1px solid #E8EEEA;
        }
        .mun-badge {
            background-color: #13493B;
            color: #E8C94A;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            padding: 3px 8px;
            min-width: 28px;
        }
    </style>
</head>

<body>

    <!-- META / ENCABEZADO -->
    {{ENCABEZADO_FOOTER}}

    <!-- HEADER INSTITUCIONAL -->
    {{HEADER}}

    <!-- FILTROS APLICADOS -->
    {{FILTROS_SECTION}}

    <!-- TOTALES GENERALES -->
    {{TOTALES_GENERALES}}

    <!-- ESTADISTICAS DEMOGRAFICAS -->
    {{ESTADISTICAS_DEMOGRAFICAS}}

    <!-- MUNICIPIOS -->
    {{MUNICIPIOS_SECTION}}

    <!-- DETALLES PARTICIPANTES -->
    {{DETALLES_PARTICIPANTES}}

</body>
</html>
