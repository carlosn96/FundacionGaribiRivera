<!doctype html>
<html lang="en">

    <head>

        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link rel="shortcut icon" type="image/png" href="../assets/images/logos/favicon.ico" />

    <body>

        <!--  Body Wrapper -->
        <div class="page-wrapper" id="main-wrapper" data-layout="vertical" data-navbarbg="skin6" data-sidebartype="full"

                                <div class="card-body pt-5">
                                    <a href="#" class="text-nowrap logo-img text-center d-block py-3 w-100">
                                        <img src="../assets/images/logos/dark-logo.svg" width="180" alt="">
                                    </a>
                                    <div class="mb-5 text-center">
                                        <p>Te enviamos un código de verificación a tu correo. Introduce el código en los campo siguientes.</p>
                                        <h6 class="fw-bolder">******<span id="ultimosDigitos"></span></h6>
                                    </div>
                                    <form id="formVerificacionCodigo">
                                        <div class="mb-3">
                                            <label class="form-label fw-semibold">Escribe tu código de seguridad de 6 caracteres</label>
                                            <div class="d-flex align-items-center gap-2 gap-sm-3">
                                                <input name="codigo[]" type="text" class="form-control" placeholder="" required="" maxlength="1">
                                                <input name="codigo[]" type="text" class="form-control" placeholder="" required="" maxlength="1">
                                                <input name="codigo[]" type="text" class="form-control" placeholder="" required="" maxlength="1">
                                                <input name="codigo[]" type="text" class="form-control" placeholder="" required="" maxlength="1">
                                                <input name="codigo[]" type="text" class="form-control" placeholder="" required="" maxlength="1">
                                                <input name="codigo[]" type="text" class="form-control" placeholder="" required="" maxlength="1">
                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-primary w-100 mb-4 rounded-pill">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-check-circle" viewBox="0 0 16 16">
                                            <path d="M8 16a8 8 0 1 0 0-16 8 8 0 0 0 0 16zm0-14a6 6 0 1 1 0 12 6 6 0 0 1 0-12z"/>
                                            <path d="M10.97 5.03a1 1 0 0 0-1.44 0L7 8.59 5.47 7.06a1 1 0 1 0-1.44 1.44l2.5 2.5a1 1 0 0 0 1.44 0l4-4a1 1 0 0 0 0-1.44z"/>
                                            </svg>
                                            Verificar mi cuenta
                                        </button>
                                        <div class="d-flex align-items-center">
                                            <a class="text-primary fw-medium ms-2" href="../index">Cancelar</a>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="../assets/libs/jquery/dist/jquery.min.js"></script>
